<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirection…</title>
  <script>
    (function() {
      var hash = window.location.hash;
      var search = window.location.search;
      var path = window.location.pathname; // ex: /Pointe_Est/

      // Si on est déjà sur /Pointe_Est/, ne pas rediriger
      if (path.indexOf('/Pointe_Est') === 0) return;

      // Sauvegarder le hash dans sessionStorage avant de rediriger
      if (hash) {
        sessionStorage.setItem('supabase_hash', hash);
      }

      var dest = 'https://simonvelucia-afk.github.io/Pointe_Est/'
        + (search || '')
        + (hash || '');

      window.location.replace(dest);
    })();
  </script>
</head>
<body><p>Redirection…</p></body>
</html>
